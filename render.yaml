# Render.com blueprint for the optional SENTINEL enterprise backend.
# One-click: New > Blueprint > point at this repo.
services:
  - type: web
    name: sentinel-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # Default is SQLite (ephemeral on free tier). Set to a Postgres URL for prod:
      #   postgresql+psycopg2://user:pass@host:5432/sentinel
      - key: SENTINEL_DATABASE_URL
        sync: false
